openapi: 3.1.0
info:
  title: EastShop API
  version: 0.1.0
  description: >
    EastShop storefront and admin API contract. Supabase REST endpoints require
    Supabase Auth and RLS. Order submission must go through the submit-order
    Edge Function so prices and Telegram identity can be verified server-side.
servers:
  - url: https://{projectRef}.supabase.co
    description: Supabase project
    variables:
      projectRef:
        default: your-project-ref
  - url: http://localhost:54321
    description: Local Supabase
security:
  - SupabaseAnonKey: []
tags:
  - name: Storefront Catalog
  - name: Admin Products
  - name: Admin Categories
  - name: Admin Orders
  - name: Edge Functions
paths:
  /rest/v1/products:
    get:
      tags:
        - Storefront Catalog
      summary: List products
      description: Storefront should request active products. Admin can request all products when RLS allows it.
      parameters:
        - $ref: '#/components/parameters/Select'
        - name: is_active
          in: query
          description: 业务用途：前台只传 `eq.true`，确保下架商品不会被普通用户看到。
          schema:
            type: string
            example: eq.true
        - name: order
          in: query
          description: 业务用途：按运营排序展示商品，通常使用 `sort_order.asc`。
          schema:
            type: string
            example: sort_order.asc
      responses:
        '200':
          description: Product rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductRow'
    post:
      tags:
        - Admin Products
      summary: Create product
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      requestBody:
        description: 业务用途：后台新增商品时提交三语内容、销售规格、分类、图片、推荐和上架状态。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRow'
      responses:
        '201':
          description: Product created.
  /rest/v1/products?id=eq.{productId}:
    patch:
      tags:
        - Admin Products
      summary: Update product
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      parameters:
        - name: productId
          in: path
          description: 业务用途：指定要编辑的商品 ID，来自商品管理列表。
          required: true
          schema:
            type: string
      requestBody:
        description: 业务用途：后台保存商品编辑结果；销售规格、上下架和推荐状态会影响前台展示和下单校验。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductPatch'
      responses:
        '204':
          description: Product updated.
    delete:
      tags:
        - Admin Products
      summary: Delete product
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      parameters:
        - name: productId
          in: path
          description: 业务用途：指定要删除的商品 ID。若商品有历史订单，业务上更建议改为下架。
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Product deleted.
  /rest/v1/categories:
    get:
      tags:
        - Storefront Catalog
      summary: List categories
      parameters:
        - $ref: '#/components/parameters/Select'
        - name: is_active
          in: query
          description: 业务用途：前台只传 `eq.true`，确保停用分类不会出现在筛选器中。
          schema:
            type: string
            example: eq.true
        - name: order
          in: query
          description: 业务用途：按运营排序展示分类，通常使用 `sort_order.asc`。
          schema:
            type: string
            example: sort_order.asc
      responses:
        '200':
          description: Category rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryRow'
    post:
      tags:
        - Admin Categories
      summary: Create category
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      requestBody:
        description: 业务用途：后台新增分类时提交三语名称、排序和启用状态。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRow'
      responses:
        '201':
          description: Category created.
  /rest/v1/categories?id=eq.{categoryId}:
    patch:
      tags:
        - Admin Categories
      summary: Update category
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      parameters:
        - name: categoryId
          in: path
          description: 业务用途：指定要编辑的分类 ID，来自分类管理列表。
          required: true
          schema:
            type: string
      requestBody:
        description: 业务用途：后台保存分类编辑结果；启用状态会影响前台筛选器。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryPatch'
      responses:
        '204':
          description: Category updated.
    delete:
      tags:
        - Admin Categories
      summary: Delete category
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      parameters:
        - name: categoryId
          in: path
          description: 业务用途：指定要删除的分类 ID。若分类下仍有商品，应先迁移商品分类。
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Category deleted.
  /rest/v1/orders:
    get:
      tags:
        - Admin Orders
      summary: List orders
      description: Admin-only order listing with nested order_items.
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      parameters:
        - name: select
          in: query
          description: 业务用途：后台订单列表需要同时读取订单主表和商品明细，常用 `*,order_items(*)`。
          schema:
            type: string
            example: '*,order_items(*)'
        - name: order
          in: query
          description: 业务用途：运营处理通常优先看最新订单，常用 `created_at.desc`。
          schema:
            type: string
            example: created_at.desc
      responses:
        '200':
          description: Order rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderRow'
  /rest/v1/orders?id=eq.{orderId}:
    patch:
      tags:
        - Admin Orders
      summary: Update order status
      security:
        - SupabaseAnonKey: []
          SupabaseBearer: []
      parameters:
        - name: orderId
          in: path
          description: 业务用途：指定要更新处理状态的订单 ID。
          required: true
          schema:
            type: string
      requestBody:
        description: 业务用途：后台运营把订单从新订单推进到已联系、已完成或已取消。
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: '#/components/schemas/OrderStatus'
      responses:
        '204':
          description: Order status updated.
  /functions/v1/submit-order:
    post:
      tags:
        - Edge Functions
      summary: Submit storefront order
      description: >
        Single order creation endpoint. Telegram orders must include initData.
        The function must verify identity, reload product variants and prices, recalculate
        totals, and write orders plus order_items.
      security:
        - SupabaseAnonKey: []
      requestBody:
        description: 业务用途：前台提交购物车、客户联系方式、定位信息和来源；服务端重新校验商品和价格。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitOrderRequest'
      responses:
        '200':
          description: Order created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitOrderResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Telegram verification failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /functions/v1/lookup-orders:
    post:
      tags:
        - Edge Functions
      summary: Lookup storefront orders
      description: >
        Public self-service order lookup. Web and Instagram requests must include
        mobile phone plus either order ID or social account. Telegram Mini App
        requests can provide verified initData so the function can look up orders
        by Telegram user ID. The function reads live order status and order items
        with service_role privileges.
      security:
        - SupabaseAnonKey: []
      requestBody:
        description: 业务用途：前台客户用手机号组合订单号/社交账号查询自己的订单；Telegram Mini App 可用 initData 验签身份后直接查询本人订单。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LookupOrdersRequest'
      responses:
        '200':
          description: Matching orders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupOrdersResponse'
        '400':
          description: Missing phone or lookup key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /functions/v1/cancel-order:
    post:
      tags:
        - Edge Functions
      summary: Cancel storefront order
      description: >
        Public self-service order cancellation. The request must include mobile phone
        and order ID. Only orders in `new` status can be cancelled by the customer.
        After successful cancellation, the function sends a Feishu cancellation
        notification when notifications are enabled.
      security:
        - SupabaseAnonKey: []
      requestBody:
        description: 业务用途：前台客户用手机号和订单号取消仍处于新订单状态的订单。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: Order cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
        '400':
          description: Missing phone or order ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found for this phone number.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Order status no longer allows customer cancellation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /functions/v1/reverse-geocode:
    post:
      tags:
        - Edge Functions
      summary: Reverse geocode browser coordinates
      description: >
        Public address reverse-geocoding proxy. The browser sends latitude,
        longitude, accuracy and language; the Edge Function reads Geoapify
        credentials from Supabase secrets and returns a normalized location
        snapshot. Geoapify failures fall back to coordinates so checkout is not
        blocked.
      security:
        - SupabaseAnonKey: []
      requestBody:
        description: 业务用途：前台下单页把浏览器定位坐标转换成可读地址，不在前端暴露 Geoapify key。
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReverseGeocodeRequest'
      responses:
        '200':
          description: Location snapshot or coordinate fallback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReverseGeocodeResponse'
        '400':
          description: Invalid coordinates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    SupabaseAnonKey:
      type: apiKey
      in: header
      name: apikey
    SupabaseBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Select:
      name: select
      in: query
      schema:
        type: string
        example: '*'
  schemas:
    LocalizedText:
      type: object
      description: 业务用途：保存中文、英文、俄文三语文案，用于前台语言切换和订单快照。
      required:
        - zh
        - en
        - ru
      properties:
        zh:
          type: string
          description: 中文文案。
        en:
          type: string
          description: 英文文案。
        ru:
          type: string
          description: 俄文文案。
    ProductSpec:
      type: object
      description: 业务用途：商品详情页展示的结构化规格，如尺寸、材质、电压、覆盖面积。
      required:
        - id
        - label
        - value
      properties:
        id:
          type: string
          description: 规格唯一键，用于 React 渲染和后台编辑定位。
        label:
          description: 规格名称三语文案，例如“尺寸”。
          $ref: '#/components/schemas/LocalizedText'
        value:
          description: 规格值三语文案，例如“600 x 600 mm”。
          $ref: '#/components/schemas/LocalizedText'
    ProductVariant:
      type: object
      description: 业务用途：商品可购买销售规格，用于前台选择、购物车拆行、订单计价和规格快照。
      required:
        - id
        - name
        - price
        - sortOrder
        - isDefault
        - isActive
      properties:
        id:
          type: string
          description: 销售规格唯一 ID。
        name:
          description: 销售规格三语名称，例如“600 x 600 mm”。
          $ref: '#/components/schemas/LocalizedText'
        price:
          type: number
          description: 该销售规格的单价，订单提交时服务端重新读取。
        sku:
          type: string
          description: 可选 SKU。
        sortOrder:
          type: integer
          description: 规格排序值。
        isDefault:
          type: boolean
          description: 是否为前台默认选中的规格。
        isActive:
          type: boolean
          description: 是否启用该规格；停用规格不能下单。
    ProductRow:
      type: object
      description: 业务用途：商品主表记录，驱动前台商品展示、购物车商品读取和后台商品管理。
      required:
        - id
        - name_zh
        - name_en
        - name_ru
        - sort_order
        - is_featured
        - is_active
      properties:
        id:
          type: string
          description: 商品唯一 ID，用于详情页深度链接、购物车和订单明细关联。
        category_id:
          description: 所属分类 ID；为空表示未分类。
          type:
            - string
            - 'null'
          format: uuid
        name_zh:
          type: string
          description: 中文商品名称。
        name_en:
          type: string
          description: 英文商品名称。
        name_ru:
          type: string
          description: 俄文商品名称。
        description_zh:
          type: string
          description: 中文短简介，用于商品列表卡片。
        description_en:
          type: string
          description: 英文短简介，用于商品列表卡片。
        description_ru:
          type: string
          description: 俄文短简介，用于商品列表卡片。
        detail_zh:
          type: string
          description: 中文商品详情，用于详情页。
        detail_en:
          type: string
          description: 英文商品详情，用于详情页。
        detail_ru:
          type: string
          description: 俄文商品详情，用于详情页。
        cover_image:
          description: 商品主图 URL，用于列表卡片和详情页首图。
          type:
            - string
            - 'null'
        cover_images:
          type: array
          description: 商品主图 URL 列表，第一张同步为列表缩略图。
          items:
            type: string
        images:
          type: array
          description: 商品图片 URL 列表，用于详情页图库。
          items:
            type: string
        specs:
          type: array
          description: 商品规格 JSON，用于展示结构化卖点。
          items:
            $ref: '#/components/schemas/ProductSpec'
        variants:
          type: array
          description: 商品销售规格 JSON，用于前台规格选择和订单计价。
          items:
            $ref: '#/components/schemas/ProductVariant'
        tags:
          type: array
          description: 商品标签，用于搜索、运营标记和前台展示。
          items:
            type: string
        sort_order:
          type: integer
          description: 运营排序值，数字越小越靠前。
        is_featured:
          type: boolean
          description: 是否推荐，用于首页推荐和后台运营筛选。
        is_active:
          type: boolean
          description: 是否上架；下架商品不在前台展示，也不能被新订单购买。
    ProductPatch:
      allOf:
        - $ref: '#/components/schemas/ProductRow'
    CategoryRow:
      type: object
      description: 业务用途：商品分类记录，用于前台筛选和后台商品归类。
      required:
        - id
        - name_zh
        - name_en
        - name_ru
        - sort_order
        - is_active
      properties:
        id:
          type: string
          format: uuid
          description: 分类唯一 ID，用于商品的 `category_id` 关联。
        name_zh:
          type: string
          description: 中文分类名称。
        name_en:
          type: string
          description: 英文分类名称。
        name_ru:
          type: string
          description: 俄文分类名称。
        sort_order:
          type: integer
          description: 分类展示排序值，数字越小越靠前。
        is_active:
          type: boolean
          description: 是否启用；停用分类不在前台筛选器中展示。
    CategoryPatch:
      allOf:
        - $ref: '#/components/schemas/CategoryRow'
    OrderStatus:
      type: string
      description: 业务用途：后台运营处理订单的状态流转。
      enum:
        - new
        - contacted
        - fulfilled
        - cancelled
    EntrySource:
      type: string
      description: 业务用途：记录订单来源，用于区分 Telegram、Instagram 和普通 Web 入口。
      enum:
        - telegram
        - instagram
        - web
    OrderItemRow:
      type: object
      description: 业务用途：订单商品明细快照，避免商品后续改名、改价影响历史订单。
      properties:
        product_id:
          type: string
          description: 商品 ID，用于后台追溯原商品。
        variant_id:
          type: string
          description: 下单时选择的销售规格 ID。
        variant_name:
          type: string
          description: 下单时选择的销售规格名称快照。
        product_name:
          type: string
          description: 下单时展示给用户的商品名称快照。
        language:
          type: string
          description: 商品名称快照使用的语言。
          enum:
            - zh
            - en
            - ru
        price:
          type: number
          description: 下单时商品单价快照。
        quantity:
          type: integer
          description: 购买数量。
        subtotal:
          type: number
          description: 明细小计，由服务端按单价和数量计算。
    OrderRow:
      type: object
      description: 业务用途：订单主表记录，供后台处理客户联系、地址确认、状态更新和导出。
      properties:
        id:
          type: string
          description: 订单唯一 ID，用于后台查询、客户沟通和导出。
        customer_name:
          type: string
          description: 客户姓名。
        phone:
          type: string
          description: 客户完整国际手机号。
        social_handle:
          description: 客户社交账号，便于 Instagram 或 Telegram 人工联系。
          type:
            - string
            - 'null'
        social_platform:
          description: 客户选择的社媒平台来源，如 telegram、instagram、facebook。
          type:
            - string
            - 'null'
        address:
          type: string
          description: 客户确认后的详细地址。
        note:
          description: 客户备注。
          type:
            - string
            - 'null'
        latitude:
          description: 浏览器定位纬度。
          type:
            - number
            - 'null'
        longitude:
          description: 浏览器定位经度。
          type:
            - number
            - 'null'
        location_accuracy:
          description: 浏览器定位精度，单位米。
          type:
            - number
            - 'null'
        geo_country:
          description: Geoapify 反查国家。
          type:
            - string
            - 'null'
        geo_city:
          description: Geoapify 反查城市或地区。
          type:
            - string
            - 'null'
        geo_street:
          description: Geoapify 反查街道或地址片段。
          type:
            - string
            - 'null'
        source:
          description: 订单来源。
          $ref: '#/components/schemas/EntrySource'
        total:
          type: number
          description: 订单总价，由服务端重新计算后写入。
        status:
          description: 后台运营处理状态。
          $ref: '#/components/schemas/OrderStatus'
        created_at:
          type: string
          format: date-time
          description: 订单创建时间。
        order_items:
          type: array
          description: 订单商品明细。
          items:
            $ref: '#/components/schemas/OrderItemRow'
    CartLine:
      type: object
      description: 业务用途：前台购物车提交给订单 Edge Function 的最小商品信息。
      required:
        - productId
        - quantity
      properties:
        productId:
          type: string
          description: 商品 ID；服务端用它重新读取价格和上架状态。
        variantId:
          type: string
          description: 可选销售规格 ID；服务端会校验规格存在且启用，并使用规格价格。
        quantity:
          type: integer
          minimum: 1
          description: 购买数量。
    CheckoutContact:
      type: object
      description: 业务用途：客户下单时填写的联系方式和地址。
      required:
        - name
        - phone
        - address
      properties:
        name:
          type: string
          description: 客户姓名。
        phone:
          type: string
          description: 客户完整国际手机号。
        address:
          type: string
          description: 客户确认后的详细地址。
        socialHandle:
          type: string
          description: 社交账号，便于人工联系。
        socialPlatform:
          type: string
          description: 社媒平台来源代码，如 telegram、instagram、facebook；与 socialHandle 配套使用。
        note:
          type: string
          description: 客户备注。
    LocationSnapshot:
      type: object
      description: 业务用途：浏览器定位和 Geoapify 反查结果，用于配送判断和后台地址核对。
      properties:
        latitude:
          type: number
          description: 定位纬度。
        longitude:
          type: number
          description: 定位经度。
        accuracy:
          type: number
          description: 定位精度，单位米。
        country:
          type: string
          description: 反查国家。
        city:
          type: string
          description: 反查城市或地区。
        district:
          type: string
          description: 反查区县。
        street:
          type: string
          description: 反查街道或地址片段。
        formattedAddress:
          type: string
          description: 反查完整格式化地址。
    ReverseGeocodeRequest:
      type: object
      description: 业务用途：前台下单页提交浏览器定位坐标给 Edge Function 做地址反查。
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          description: 定位纬度。
          example: 43.238949
        longitude:
          type: number
          description: 定位经度。
          example: 76.889709
        accuracy:
          type: number
          description: 浏览器定位精度，单位米。
          example: 38
        language:
          type: string
          description: 地址反查语言。
          enum:
            - zh
            - en
            - ru
          example: zh
    ReverseGeocodeResponse:
      type: object
      description: 业务用途：地址反查结果；失败时仍返回经纬度兜底。
      required:
        - location
      properties:
        location:
          $ref: '#/components/schemas/LocationSnapshot'
    SubmitOrderRequest:
      type: object
      description: 业务用途：前台唯一订单提交请求，不能包含可信价格，价格必须由服务端重算。
      required:
        - cart
        - contact
        - source
        - language
      properties:
        cart:
          type: array
          description: 购物车商品 ID 和数量。
          items:
            $ref: '#/components/schemas/CartLine'
        contact:
          description: 客户联系方式和地址。
          $ref: '#/components/schemas/CheckoutContact'
        location:
          description: 定位和地址反查快照。
          $ref: '#/components/schemas/LocationSnapshot'
        source:
          description: 订单来源。
          $ref: '#/components/schemas/EntrySource'
        language:
          type: string
          description: 用户下单时使用的界面语言。
          enum:
            - zh
            - en
            - ru
        telegramInitData:
          type: string
          description: Telegram Mini App initData；Telegram 来源必须提交，服务端必须验证。
    SubmitOrderResponse:
      type: object
      description: 业务用途：订单创建成功后返回给前台用于展示提交结果。
      required:
        - orderId
        - total
        - status
      properties:
        orderId:
          type: string
          description: 新创建的订单 ID。
        total:
          type: number
          description: 服务端确认后的订单总价。
        status:
          description: 初始订单状态，通常为 `new`。
          $ref: '#/components/schemas/OrderStatus'
    LookupOrdersRequest:
      type: object
      description: 业务用途：前台“我的订单”查询请求。Web/Instagram 使用手机号组合订单号或社交账号；Telegram Mini App 可使用验签 initData 直接查询本人订单。
      properties:
        phone:
          type: string
          description: Web/Instagram 查询时的完整国际手机号。
          example: '+8613800000000'
        orderId:
          type: string
          description: 订单号；Web/Instagram 与手机号组合查询。
        socialHandle:
          type: string
          description: 社交账号；Web/Instagram 与手机号组合查询。
        socialPlatform:
          type: string
          description: 社媒平台来源代码；可与手机号和社交账号组合查询。
        telegramInitData:
          type: string
          description: Telegram Mini App initData；服务端验签后按 Telegram user.id 查询本人订单。
    LookupOrdersResponse:
      type: object
      description: 业务用途：前台订单查询结果，状态来自当前订单表。
      required:
        - orders
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderRow'
    CancelOrderRequest:
      type: object
      description: 业务用途：前台“我的订单”取消订单请求。
      required:
        - orderId
        - phone
      properties:
        orderId:
          type: string
          description: 要取消的订单号。
          example: ORD-20260604-5410EF23
        phone:
          type: string
          description: 完整国际手机号，必须与订单手机号匹配。
          example: '+8613800000000'
    CancelOrderResponse:
      type: object
      description: 业务用途：订单取消成功后返回最新订单状态。
      required:
        - orderId
        - status
      properties:
        orderId:
          type: string
          description: 已取消的订单号。
        status:
          description: 取消后的订单状态，固定为 `cancelled`。
          $ref: '#/components/schemas/OrderStatus'
    ErrorResponse:
      type: object
      description: 业务用途：接口失败时返回给前端展示或记录的错误信息。
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: 稳定错误码，例如 `INVALID_TELEGRAM_INIT_DATA`。
        message:
          type: string
          description: 面向开发或运营排查的错误说明。
