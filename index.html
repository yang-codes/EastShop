<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EastShop</title>
    <script>
      window.__eastshopMainLoaded = false

      window.__eastshopShowBootError = function (message) {
        var root = document.getElementById('root')

        if (!root || root.childElementCount > 0) {
          return
        }

        root.innerHTML = '<main style="font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;color:#0f172a;background:#f6f8fb;min-height:100vh"><section style="background:#fff;border:1px solid #d8e1ec;border-radius:12px;padding:18px;box-shadow:0 12px 32px rgba(15,23,42,.08)"><h1 style="font-size:18px;margin:0 0 8px">EastShop</h1><p style="margin:0;color:#526071">Page failed to start. Please close and reopen the mini app.</p><pre style="white-space:pre-wrap;word-break:break-word;color:#b42318;font-size:12px;margin-top:12px">' + String(message || 'Unknown error').slice(0, 400) + '</pre></section></main>'
      }

      window.addEventListener('error', function (event) {
        window.__eastshopShowBootError(event.message)
      })

      window.addEventListener('unhandledrejection', function (event) {
        window.__eastshopShowBootError(event.reason && (event.reason.message || event.reason))
      })

      window.setTimeout(function () {
        var message = window.__eastshopMainLoaded
          ? 'The app script loaded, but React did not render within 20 seconds.'
          : 'The app script did not load. Please check that /src/main.tsx is reachable from this device.'

        window.__eastshopShowBootError(message)
      }, 20000)
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
